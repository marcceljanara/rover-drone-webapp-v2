<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Koneksi Terputus | AgroSwarm</title>
  <link rel="icon" href="/favicon.ico" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 1rem;
      font-family: Roboto, Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, rgba(22, 122, 63, 0.18), transparent 30rem), #f4f8f3;
      color: #10231c;
      text-align: center;
    }
    main {
      width: min(30rem, 100%);
      padding: clamp(1.5rem, 6vw, 3rem);
      border: 1px solid #dce8dc;
      border-radius: 24px;
      background: #ffffff;
      box-shadow: 0 16px 44px rgba(16, 35, 28, 0.12);
    }
    .icon {
      width: 4rem;
      height: 4rem;
      display: inline-grid;
      place-items: center;
      margin-bottom: 1rem;
      border-radius: 50%;
      background: #e7f6ec;
      color: #167a3f;
      font-size: 2rem;
      font-weight: 900;
    }
    h1 {
      margin-bottom: 0.75rem;
      font-size: clamp(1.75rem, 6vw, 2.5rem);
      line-height: 1;
    }
    p {
      margin-bottom: 1.5rem;
      color: #60736a;
      line-height: 1.6;
    }
    .btn {
      min-height: 2.75rem;
      padding: 0.75rem 1.1rem;
      border: 0;
      border-radius: 999px;
      background: #167a3f;
      color: #ffffff;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
    .btn:hover { background: #0f5f31; }
    .btn:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px rgba(22, 122, 63, 0.18);
    }
  </style>
</head>
<body>
  <main>
    <div class="icon" aria-hidden="true">!</div>
    <h1>Kamu Sedang Offline</h1>
    <p>Sepertinya koneksi internet terputus. Periksa jaringan lalu coba muat ulang halaman.</p>
    <button class="btn" onclick="location.reload()">Coba Lagi</button>
  </main>
</body>
</html>
